name: Deploy marketing site

on:
  push:
    branches: [main]
    paths:
      - "apps/marketing/**"
      - ".github/workflows/marketing-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "marketing-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        # --no-frozen-lockfile because pre-existing dependenciesMeta drift on
        # source-device-export blocks frozen mode. The marketing package has
        # no workspace dependencies, so lockfile drift outside its subgraph
        # cannot affect this build.
        run: pnpm install --no-frozen-lockfile --filter @archi/marketing...

      - name: Build site
        run: pnpm --filter @archi/marketing build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/marketing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
