name: Deploy marketing site

on:
  push:
    branches: [main]
    paths:
      - "apps/marketing/**"
      - ".github/workflows/marketing-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "marketing-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        # --no-frozen-lockfile: pre-existing dependenciesMeta drift on
        # source-device-export blocks frozen mode.
        # --ignore-scripts: workspace root postinstall rebuilds Electron native
        # modules (better-sqlite3) which the marketing build doesn't need and
        # which fails when desktop deps aren't installed.
        # The marketing package has no workspace deps and no scripts.
        run: pnpm install --no-frozen-lockfile --ignore-scripts --filter @archi/marketing...

      - name: Build site
        run: pnpm --filter @archi/marketing build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/marketing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
