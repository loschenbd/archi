name: Release Desktop

# Triggered by pushing a version tag (e.g. v0.2.1).
# Bump apps/desktop/package.json first, commit, then tag and push.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + sign + notarize but do NOT publish to GH Releases"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache fetched embedding model
        uses: actions/cache@v4
        with:
          path: apps/desktop/resources/models
          key: bge-small-en-v1.5-${{ hashFiles('apps/desktop/scripts/fetch-embedding-model.mjs') }}

      - name: Import Developer ID cert into temp keychain
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${MAC_CERT_P12_BASE64:?missing MAC_CERT_P12_BASE64 secret}"
          : "${MAC_CERT_PASSWORD:?missing MAC_CERT_PASSWORD secret}"
          : "${KEYCHAIN_PASSWORD:?missing KEYCHAIN_PASSWORD secret}"

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$MAC_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend our keychain so codesign + notarytool see it first.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify the signing identity is now resolvable.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm "$CERT_PATH"

          echo "BUILD_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Verify package.json version matches the tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match apps/desktop/package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Releasing v$PKG_VERSION"

      - name: Build, sign, notarize, publish
        if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEYCHAIN: ${{ env.BUILD_KEYCHAIN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm release

      - name: Build, sign, notarize (dry run — no publish)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        working-directory: apps/desktop
        env:
          CSC_KEYCHAIN: ${{ env.BUILD_KEYCHAIN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm package

      - name: Upload DMG as workflow artifact (dry run)
        # Run even on previous-step failure so a verify-signing rejection
        # still lets us inspect the built DMG locally.
        if: always() && github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: archi-dmg-dry-run
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/latest-mac.yml
          if-no-files-found: warn

      - name: Cleanup temp keychain
        if: always() && env.BUILD_KEYCHAIN != ''
        run: |
          security delete-keychain "$BUILD_KEYCHAIN" || true
