appId: com.archi.desktop
productName: Archi
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - package.json
  - "!node_modules/@archi/*/src{,/**/*}"
  - "!node_modules/@archi/*/{test,tests,__tests__}{,/**/*}"
  - "!node_modules/@archi/*/tsconfig*.json"
asarUnpack:
  - "**/*.node"
  - "**/*.dylib"
  - "node_modules/sqlite-vec/**"
  - "node_modules/sqlite-vec-darwin-arm64/**"
  - "node_modules/sqlite-vec-darwin-x64/**"
  - "node_modules/onnxruntime-node/**"
  - "node_modules/@xenova/**"
extraResources:
  - from: resources/models
    to: models
mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  # Stable, version-less DMG filename so the marketing site's
  # /releases/latest/download/Archi-arm64.dmg link resolves on every
  # release without manual asset renaming.
  artifactName: "${productName}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  notarize:
    teamId: "74KV536J36"
    # Creds come from a macOS Keychain profile stored once via:
    #   xcrun notarytool store-credentials archi-notarize \
    #     --apple-id "<your apple id>" \
    #     --team-id 74KV536J36 \
    #     --password "<app-specific password>"
    # No env vars needed at build time.
    keychainProfile: archi-notarize
  target:
    - dmg
publish:
  - provider: github
    owner: loschenbd
    repo: archi
    releaseType: release
