appId: com.archi.desktop
productName: Archi
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - package.json
  - "!node_modules/@archi/*/src{,/**/*}"
  - "!node_modules/@archi/*/{test,tests,__tests__}{,/**/*}"
  - "!node_modules/@archi/*/tsconfig*.json"
asarUnpack:
  - "**/*.node"
mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  # Stable, version-less DMG filename so the marketing site's
  # /releases/latest/download/Archi-arm64.dmg link resolves on every
  # release without manual asset renaming.
  artifactName: "${productName}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  notarize:
    teamId: "74KV536J36"
  target:
    - dmg
publish:
  - provider: github
    owner: loschenbd
    repo: archi
    releaseType: release
