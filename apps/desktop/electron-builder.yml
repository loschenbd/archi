appId: com.archi.desktop
productName: Archi
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - package.json
  - "!node_modules/@archi/*/src{,/**/*}"
  - "!node_modules/@archi/*/{test,tests,__tests__}{,/**/*}"
  - "!node_modules/@archi/*/tsconfig*.json"
asarUnpack:
  - "**/*.node"
  - "**/*.dylib"
  - "node_modules/sqlite-vec/**"
  - "node_modules/sqlite-vec-darwin-arm64/**"
  - "node_modules/sqlite-vec-darwin-x64/**"
  - "node_modules/onnxruntime-node/**"
  - "node_modules/@xenova/**"
extraResources:
  - from: resources/models
    to: models
mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  # Stable, version-less DMG filename so the marketing site's
  # /releases/latest/download/Archi-arm64.dmg link resolves on every
  # release without manual asset renaming.
  artifactName: "${productName}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  notarize:
    teamId: "74KV536J36"
    # Credentials come from env vars at build time:
    #   APPLE_ID                       — Apple ID email
    #   APPLE_APP_SPECIFIC_PASSWORD    — app-specific password from
    #                                    https://appleid.apple.com
    # In CI these come from GitHub Actions secrets (see
    # .github/workflows/desktop-release.yml). For local releases, export
    # them in your shell before running `pnpm release`. electron-builder
    # 24+ does not support `keychainProfile` on `mac.notarize`.
  target:
    - dmg
publish:
  - provider: github
    owner: loschenbd
    repo: archi
    releaseType: release
# Run our DMG notarization hook AFTER electron-builder finishes building all
# artifacts but BEFORE the publish step. electron-builder's mac.notarize only
# covers the .app; the DMG container needs its own notarization+staple on
# macOS Sequoia+ for `spctl --assess --type install` to accept the download.
afterAllArtifactBuild: scripts/afterAllArtifactBuild.cjs
