appId: com.archi.desktop
productName: Archi
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - package.json
  - "!node_modules/@archi/*/src{,/**/*}"
  - "!node_modules/@archi/*/{test,tests,__tests__}{,/**/*}"
  - "!node_modules/@archi/*/tsconfig*.json"
asarUnpack:
  - "**/*.node"
  - "**/*.dylib"
  - "node_modules/sqlite-vec/**"
  - "node_modules/sqlite-vec-darwin-arm64/**"
  - "node_modules/sqlite-vec-darwin-x64/**"
  - "node_modules/onnxruntime-node/**"
  - "node_modules/@xenova/**"
extraResources:
  - from: resources/models
    to: models
mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  # Stable, version-less DMG filename so the marketing site's
  # /releases/latest/download/Archi-arm64.dmg link resolves on every
  # release without manual asset renaming.
  artifactName: "${productName}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  # Built-in notarization is EXPLICITLY disabled — the afterSign hook owns it
  # (via @electron/notarize, which supports both Apple-ID env creds for CI and
  # a local `notarytool` keychain profile; see scripts/notary-credentials.cjs).
  # `notarize: false` matters: with the key merely ABSENT, electron-builder
  # auto-attempts built-in notarization whenever APPLE_ID env vars are present
  # (i.e. in CI) and crashes with "Cannot destructure property 'appBundleId'
  # of 'options' as it is undefined". Locally (no env vars) it just skipped.
  notarize: false
  # zip is REQUIRED for macOS auto-update: electron-updater can only install
  # from a zip target; a DMG-only release strands existing installs.
  target:
    - dmg
    - zip
publish:
  - provider: github
    owner: loschenbd
    repo: archi
    releaseType: release
# afterSign: notarize + staple the signed .app (replaces mac.notarize).
afterSign: scripts/afterSign.cjs
# afterAllArtifactBuild: notarize + staple the DMG container after it's built but
# before publish. The .app staple alone isn't enough — on macOS Sequoia+ the DMG
# needs its own ticket for `spctl --assess --type install` to accept the download.
afterAllArtifactBuild: scripts/afterAllArtifactBuild.cjs
